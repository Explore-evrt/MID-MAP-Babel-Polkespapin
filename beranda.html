<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Risiko, Faskes & Cuaca Real-Time - Kep. Bangka Belitung</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; flex-direction: column; height: 100vh;
            background-color: #f4f6f9;
        }
        header {
            background-color: #2c3e50; color: white; padding: 12px 15px;
            text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); z-index: 1000;
        }
        header h1 { margin: 0; font-size: 1.3rem; font-weight: 600; }
        header p { margin: 4px 0 0 0; font-size: 0.85rem; opacity: 0.8; }
        
        .main-container {
            display: flex; flex: 1; flex-direction: column;
            position: relative; height: calc(100vh - 65px);
        }
        #map { width: 100%; height: 100%; flex: 1; }

        .legend {
            background: white; padding: 10px 12px; line-height: 20px;
            color: #333; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.2);
            font-size: 0.75rem; max-width: 220px;
        }
        .legend h4 { margin: 0 0 6px 0; font-size: 0.8rem; border-bottom: 1px solid #ddd; padding-bottom: 4px; font-weight: bold;}
        .legend i { width: 14px; height: 14px; float: left; margin-right: 8px; border-radius: 3px; opacity: 0.8; }
        
        .popup-scroll { max-height: 300px; overflow-y: auto; padding-right: 5px; min-width: 250px; }
        .popup-title { font-weight: bold; font-size: 1rem; color: #2c3e50; margin-bottom: 4px; border-bottom: 2px solid #34495e; padding-bottom: 2px; }
        
        /* Box Cuaca */
        .weather-box {
            display: flex; align-items: center; background: #eef2f7; 
            border-radius: 6px; padding: 8px; margin-top: 5px; margin-bottom: 8px;
            border-left: 4px solid #3498db;
        }
        .weather-icon { width: 45px; height: 45px; margin-right: 5px; }
        .weather-info { font-size: 0.8rem; }
        .weather-info .temp { font-weight: bold; font-size: 0.95rem; color: #111; }

        .section-title { font-size: 0.8rem; font-weight: bold; background: #eaecee; padding: 3px 6px; margin-top: 8px; margin-bottom: 4px; color: #2c3e50; border-radius: 4px; }
        .popup-table { width: 100%; border-collapse: collapse; }
        .popup-table td { padding: 3px 2px; font-size: 0.78rem; vertical-align: top; border-bottom: 1px dashed #eee; }
        .popup-table td.label { color: #555; width: 50%; }
        .popup-table td.value { font-weight: 600; color: #111; text-align: right; }
        
        .badge { display: inline-block; padding: 1px 6px; border-radius: 4px; font-size: 0.7rem; color: white; font-weight: bold; margin-top: 2px; }
        .bg-merah { background-color: #d32f2f; }
        .bg-kuning { background-color: #fbc02d; color: #333; }
        .bg-hijau { background-color: #388e3c; }

        .popup-scroll::-webkit-scrollbar { width: 4px; }
        .popup-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

        @media (min-width: 768px) {
            header h1 { font-size: 1.6rem; }
            header p { font-size: 0.95rem; }
            .legend { font-size: 0.85rem; max-width: 280px; line-height: 24px; }
            .legend h4 { font-size: 0.9rem; }
            .popup-scroll { min-width: 300px; max-height: 380px; }
            .popup-title { font-size: 1.1rem; }
            .popup-table td { font-size: 0.85rem; padding: 4px 2px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Sistem Informasi Geografis Kebencanaan, Kesehatan & Cuaca</h1>
        <p>Provinsi Kepulauan Bangka Belitung </p>
		<p>Mahasiswi Kebidanan Poltekkes Kemenkes Pangkalpinang </p>
    </header>

    <div class="main-container">
        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const isMobile = window.innerWidth < 768;
        const map = L.map('map').setView([-2.5337, 106.7119], isMobile ? 8 : 9); 

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors | Cuaca Real-time Terhubung'
        }).addTo(map);

        const dataBabel = [
            {
                nama: "Kabupaten Bangka", lat: -1.9124, lng: 105.9928, statusBanjir: "merah", penduduk: 337755,
                rs: 5, pusk: 12, klinik: 9, dokter: 115, perawat: 464, bidan: 235, farmasi: 72, gizi: 35,
                bencana: { gempa: "Rendah", gunung: "Tidak Ada", tsunami: "Rendah", longsor: "Sedang", banjir: "Tinggi", badai: "Tinggi", kekeringan: "Sedang", karhutla: "Tinggi" }
            },
            {
                nama: "Kabupaten Belitung", lat: -2.8711, lng: 107.6972, statusBanjir: "kuning", penduduk: 189945,
                rs: 2, pusk: 9, klinik: 7, dokter: 74, perawat: 320, bidan: 170, farmasi: 42, gizi: 22,
                bencana: { gempa: "Rendah", gunung: "Tidak Ada", tsunami: "Sedang", longsor: "Rendah", banjir: "Sedang", badai: "Sedang", kekeringan: "Rendah", karhutla: "Sedang" }
            },
            {
                nama: "Kabupaten Bangka Barat", lat: -1.8214, lng: 105.1874, statusBanjir: "merah", penduduk: 216238,
                rs: 2, pusk: 8, klinik: 10, dokter: 62, perawat: 288, bidan: 154, farmasi: 31, gizi: 19,
                bencana: { gempa: "Rendah", gunung: "Tidak Ada", tsunami: "Rendah", longsor: "Sedang", banjir: "Tinggi", badai: "Tinggi", kekeringan: "Sedang", karhutla: "Tinggi" }
            },
            {
                nama: "Kabupaten Bangka Tengah", lat: -2.4116, lng: 106.1118, statusBanjir: "kuning", penduduk: 209117,
                rs: 1, pusk: 9, klinik: 4, dokter: 58, perawat: 254, bidan: 148, farmasi: 28, gizi: 18,
                bencana: { gempa: "Rendah", gunung: "Tidak Ada", tsunami: "Rendah", longsor: "Rendah", banjir: "Sedang", badai: "Tinggi", kekeringan: "Sedang", karhutla: "Tinggi" }
            },
            {
                nama: "Kabupaten Bangka Selatan", lat: -2.8021, lng: 106.2736, statusBanjir: "kuning", penduduk: 213877,
                rs: 2, pusk: 10, klinik: 5, dokter: 51, perawat: 242, bidan: 161, farmasi: 22, gizi: 16,
                bencana: { gempa: "Rendah", gunung: "Tidak Ada", tsunami: "Sedang", longsor: "Rendah", banjir: "Sedang", badai: "Sedang", kekeringan: "Tinggi", karhutla: "Tinggi" }
            },
            {
                nama: "Kabupaten Belitung Timur", lat: -2.9326, lng: 108.1584, statusBanjir: "hijau", penduduk: 133386,
                rs: 1, pusk: 7, klinik: 3, dokter: 44, perawat: 210, bidan: 122, farmasi: 25, gizi: 14,
                bencana: { gempa: "Rendah", gunung: "Tidak Ada", tsunami: "Rendah", longsor: "Rendah", banjir: "Rendah", badai: "Sedang", kekeringan: "Rendah", karhutla: "Sedang" }
            },
            {
                nama: "Kota Pangkalpinang", lat: -2.1292, lng: 106.1138, statusBanjir: "merah", penduduk: 242285,
                rs: 7, pusk: 9, klinik: 18, dokter: 184, perawat: 532, bidan: 212, farmasi: 114, gizi: 42,
                bencana: { gempa: "Rendah", gunung: "Tidak Ada", tsunami: "Rendah", longsor: "Tidak Ada", banjir: "Tinggi", badai: "Tinggi", kekeringan: "Rendah", karhutla: "Rendah" }
            }
        ];

        function dapatkanWarna(status) {
            switch(status) {
                case 'merah': return '#d32f2f';
                case 'kuning': return '#fbc02d';
                case 'hijau': return '#388e3c';
                default: return '#7f8c8d';
            }
        }

        function dapatkanTeksStatus(status) {
            if (status === 'merah') return 'Risiko Tinggi';
            if (status === 'kuning') return 'Risiko Sedang';
            return 'Risiko Rendah / Aman';
        }

        // FUNGSI UTAMA: Mengambil data cuaca menggunakan KUNCI API milikmu
        async function ambilDataCuaca(lat, lng, elementId) {
            try {
                // Di sini Kunci API (93ebce989a240572a3d692657d4fcac1) sudah dipasang langsung
                const apiKey = "93ebce989a240572a3d692657d4fcac1"; 
                const respons = await fetch(`https://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${lat},${lng}&lang=id`);
                const data = await respons.json();
                
                if(data && data.current) {
                    const cuacaBox = document.getElementById(elementId);
                    cuacaBox.innerHTML = `
                        <img class="weather-icon" src="https:${data.current.condition.icon}" alt="Awan">
                        <div class="weather-info">
                            <div class="temp">${data.current.temp_c}°C - ${data.current.condition.text}</div>
                            <div>💨 Angin: ${data.current.wind_kph} km/jam | 💧 Kelembaban: ${data.current.humidity}%</div>
                        </div>
                    `;
                }
            } catch (error) {
                document.getElementById(elementId).innerHTML = "⚠️ Gagal memuat info awan/cuaca live.";
            }
        }

        dataBabel.forEach((daerah, indeks) => {
            const marker = L.circleMarker([daerah.lat, daerah.lng], {
                color: dapatkanWarna(daerah.statusBanjir),
                fillColor: dapatkanWarna(daerah.statusBanjir),
                fillOpacity: 0.55,
                radius: isMobile ? 15 : 18, 
                weight: 2
            }).addTo(map);

            const totalFaskes = daerah.rs + daerah.pusk + daerah.klinik;
            const weatherDivId = `weather-id-${indeks}`;

            const kontenPopup = `
                <div class="popup-scroll">
                    <div class="popup-title">${daerah.nama}</div>
                    <span class="badge bg-${daerah.statusBanjir}">${dapatkanTeksStatus(daerah.statusBanjir)}</span>
                    
                    <div class="section-title">☁️ KONDISI CUACA & AWAN (LIVE)</div>
                    <div id="${weatherDivId}" class="weather-box">
                        ⏳ Memanggil data satelit cuaca...
                    </div>

                    <table class="popup-table">
                        <tr><td class="label">👥 Jumlah Penduduk:</td><td class="value">${daerah.penduduk.toLocaleString('id-ID')} Jiwa</td></tr>
                    </table>

                    <div class="section-title">🏥 STRUKTUR FASILITAS KESEHATAN</div>
                    <table class="popup-table">
                        <tr><td class="label">Rumah Sakit (RS):</td><td class="value">${daerah.rs} Unit</td></tr>
                        <tr><td class="label">Puskesmas:</td><td class="value">${daerah.pusk} Unit</td></tr>
                        <tr><td class="label">Klinik Pratama/Utama:</td><td class="value">${daerah.klinik} Unit</td></tr>
                        <tr style="font-weight:bold; background:#f8f9fa;"><td class="label">Total Faskes:</td><td class="value">${totalFaskes} Unit</td></tr>
                    </table>

                    <div class="section-title">🧑‍⚕️ RINCIAN TENAGA KESEHATAN (NAKES)</div>
                    <table class="popup-table">
                        <tr><td class="label">Dokter (Umum/Spesialis):</td><td class="value">${daerah.dokter} Orang</td></tr>
                        <tr><td class="label">Perawat:</td><td class="value">${daerah.perawat} Orang</td></tr>
                        <tr><td class="label">Bidan:</td><td class="value">${daerah.bidan} Orang</td></tr>
                        <tr><td class="label">Farmasi (Apoteker/Asisten):</td><td class="value">${daerah.farmasi} Orang</td></tr>
                        <tr><td class="label">Nutrisionis / Ahli Gizi:</td><td class="value">${daerah.gizi} Orang</td></tr>
                    </table>

                    <div class="section-title">🌋 1. INDEKS RISIKO BENCANA GEOLOGI</div>
                    <table class="popup-table">
                        <tr><td class="label">Gempa Bumi:</td><td class="value">${daerah.bencana.gempa}</td></tr>
                        <tr><td class="label">Gunung Meletus:</td><td class="value">${daerah.bencana.gunung}</td></tr>
                        <tr><td class="label">Tsunami:</td><td class="value">${daerah.bencana.tsunami}</td></tr>
                        <tr><td class="label">Tanah Longsor:</td><td class="value">${daerah.bencana.longsor}</td></tr>
                    </table>

                    <div class="section-title">🌪️ 2. INDEKS RISIKO BENCANA METEOROLOGI</div>
                    <table class="popup-table">
                        <tr><td class="label">Banjir & Banjir Bandang:</td><td class="value" style="color:${dapatkanWarna(daerah.statusBanjir)}">${daerah.bencana.banjir.toUpperCase()}</td></tr>
                        <tr><td class="label">Badai / Puting Beliung:</td><td class="value">${daerah.bencana.badai}</td></tr>
                        <tr><td class="label">Kekeringan Ekstrem:</td><td class="value">${daerah.bencana.kekeringan}</td></tr>
                        <tr><td class="label">Kebakaran Hutan & Lahan:</td><td class="value">${daerah.bencana.karhutla}</td></tr>
                    </table>
                </div>
            `;
            
            marker.bindPopup(kontenPopup);

            // Menjalankan fungsi panggil data cuaca saat popup dibuka pengguna
            marker.on('popupopen', () => {
                ambilDataCuaca(daerah.lat, daerah.lng, weatherDivId);
            });
        });

        const legenda = L.control({ position: 'bottomright' });
        legenda.onAdd = function () {
            const div = L.DomUtil.create('div', 'legend');
            div.innerHTML += '<h4>Tingkat Risiko Banjir (Pusat)</h4>';
            div.innerHTML += '<i style="background: #d32f2f"></i> Merah (Tinggi)<br>';
            div.innerHTML += '<i style="background: #fbc02d"></i> Kuning (Sedang)<br>';
            div.innerHTML += '<i style="background: #388e3c"></i> Hijau (Rendah / Aman)<br>';
            return div;
        };
        legenda.addTo(map);
    </script>
</body>
</html>
